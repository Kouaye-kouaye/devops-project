# ══════════════════════════════════════════════════════════════════════════════
# Pipeline CI/CD — DeployFast Task Manager
# ══════════════════════════════════════════════════════════════════════════════
name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main,develop]

env:
  JAVA_VERSION: "21"
  DOCKER_IMAGE: deployfast/taskmanager

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1 : BUILD & TEST
  # ─────────────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Tests (JUnit + JaCoCo)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: taskmanager_test
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configuration JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Compilation et exécution des tests
        env:
          SPRING_PROFILES_ACTIVE: test
        run: |
          mvn clean verify \
            -Dspring.datasource.url=jdbc:h2:mem:testdb \
            --no-transfer-progress \
            -B

      - name: Vérification couverture de code (≥ 60%)
        run: |
          mvn jacoco:check --no-transfer-progress -B

      - name: Upload rapport de couverture JaCoCo
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 14

      - name: Upload rapport XML (pour SonarQube)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-xml
          path: target/site/jacoco/jacoco.xml

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2 : ANALYSE SONARQUBE (DevSecOps - SAST)
  # ─────────────────────────────────────────────────────────────────────────
  sonarqube-analysis:
    name: Analyse Qualité SonarQube
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Download rapport JaCoCo
        uses: actions/download-artifact@v4
        with:
          name: jacoco-xml
          path: target/site/jacoco/

      - name: Analyse SonarQube
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=deployfast-taskmanager \
            -Dsonar.projectName="DeployFast Task Manager" \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.qualitygate.wait=true \
            --no-transfer-progress -B

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3 : SCAN DE SÉCURITÉ (DevSecOps)
  # ─────────────────────────────────────────────────────────────────────────
  security-scan:
    name: Scan de Sécurité (Trivy + OWASP)
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: OWASP Dependency-Check
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            --no-transfer-progress -B || true

      - name: Build Docker image pour scan
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }}:scan-${{ github.sha }} .

      - name: Scan Trivy (vulnérabilités image Docker)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:scan-${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Upload résultats Trivy vers GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 4 : BUILD & PUSH DOCKER IMAGE
  # ─────────────────────────────────────────────────────────────────────────
  docker-build-push:
    name: Build & Push Image Docker
    runs-on: ubuntu-latest
    needs: [sonarqube-analysis, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configuration Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extraction métadonnées Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build et Push image multi-architecture
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 5 : DÉPLOIEMENT AUTOMATIQUE
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Déploiement Production
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://api.deployfast.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Déploiement via SSH sur le serveur
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/taskmanager
            
            # Récupération de la dernière image
            docker pull deployfast/taskmanager:latest
            
            # Déploiement zero-downtime avec docker compose
            docker compose pull
            docker compose up -d --no-deps --build app
            
            # Attente que l'application soit healthy
            timeout 120 bash -c 'until docker compose exec app wget -qO- http://localhost:8080/actuator/health; do sleep 5; done'
            
            echo "✅ Déploiement réussi !"

      - name: Notification Slack
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: |
            Déploiement ${{ job.status == 'success' && '✅ RÉUSSI' || '❌ ÉCHOUÉ' }}
            Commit: ${{ github.sha }}
            Auteur: ${{ github.actor }}
