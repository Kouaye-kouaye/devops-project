version: "3.9"

# ══════════════════════════════════════════════════════════════════════════════
# DeployFast Task Manager — Docker Compose
# Services : app (Spring Boot) + db (MySQL) + sonarqube
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ─── Application Spring Boot ───────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: taskmanager-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-taskmanager}
      DB_USER: ${DB_USER:-taskuser}
      DB_PASSWORD: ${DB_PASSWORD:-SecurePass@2024}
      JWT_SECRET: ${JWT_SECRET:-404D635166546A576E5A7234753778214125442A472D4B6150645367566B5970}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - taskmanager-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─── MySQL 8 ──────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: taskmanager-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-RootPass@2024}
      MYSQL_DATABASE: ${DB_NAME:-taskmanager}
      MYSQL_USER: ${DB_USER:-taskuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-SecurePass@2024}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - taskmanager-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-RootPass@2024}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─── SonarQube (analyse qualité) ──────────────────────────────────────────
  sonarqube:
    image: sonarqube:10-community
    container_name: taskmanager-sonar
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar_db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonar_data:/opt/sonarqube/data
      - sonar_logs:/opt/sonarqube/logs
      - sonar_extensions:/opt/sonarqube/extensions
    depends_on:
      sonar_db:
        condition: service_healthy
    networks:
      - taskmanager-net

  sonar_db:
    image: postgres:15-alpine
    container_name: taskmanager-sonar-db
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonar_pg_data:/var/lib/postgresql/data
    networks:
      - taskmanager-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar"]
      interval: 10s
      timeout: 5s
      retries: 5

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  mysql_data:
  sonar_data:
  sonar_logs:
  sonar_extensions:
  sonar_pg_data:

# ─── Réseaux ──────────────────────────────────────────────────────────────────
networks:
  taskmanager-net:
    driver: bridge
